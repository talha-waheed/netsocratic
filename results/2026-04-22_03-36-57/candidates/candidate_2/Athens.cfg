!
version 15.2
!
hostname Athens
!
interface Fa0/0
 ip address 100.0.5.1 255.255.255.0
 description "To 100.0.5.0/24"
 speed auto
 duplex auto
!
interface Fa0/1
 ip address 10.0.0.26 255.255.255.254
 ip ospf 100 area 0
 ip ospf cost 1
 description "To Sofia"
 speed auto
 duplex auto
!
interface Fa1/0
 ip address 10.0.0.13 255.255.255.254
 ip ospf 100 area 0
 ip ospf cost 1
 description "To Istanbul"
 speed auto
 duplex auto
!
router ospf 100
 redistribute connected subnets
 maximum-paths 32
!
end
